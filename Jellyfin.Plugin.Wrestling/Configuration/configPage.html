<!DOCTYPE html>
<html>
<head>
    <title>Wrestling</title>
</head>
<body>
    <div id="WrestlingConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary">
                <form id="WrestlingConfigForm">
                    <div class="inputContainer">
                        <label class="checkboxContainer">
                            <input is="emby-checkbox" type="checkbox" id="EnableAutomaticLookup" />
                            <span>Enable CageMatch title/year lookup</span>
                        </label>
                    </div>
                    <div class="inputContainer">
                        <label class="checkboxContainer">
                            <input is="emby-checkbox" type="checkbox" id="EnableScheduledScan" />
                            <span>Enable scheduled background scan</span>
                        </label>
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="number" id="CrawlDelaySeconds" min="1" label="CageMatch request delay in seconds" />
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="UserAgent" label="HTTP user agent" />
                    </div>
                    <div class="inputContainer">
                        <label class="checkboxContainer">
                            <input is="emby-checkbox" type="checkbox" id="IncludeRatingsInOverview" />
                            <span>Include ratings in the match card overview</span>
                        </label>
                    </div>
                    <div class="selectContainer">
                        <label class="selectLabel" for="SelectedLibraryNames">Libraries to scan</label>
                        <select is="emby-select" id="SelectedLibraryNames" multiple="multiple"></select>
                        <div class="fieldDescription">Select one or more libraries that contain wrestling PPV movies.</div>
                    </div>
                    <div class="inputContainer">
                        <textarea is="emby-textarea" id="ScanStatus" label="Scan status" readonly></textarea>
                    </div>
                    <div class="inputContainer">
                        <textarea is="emby-textarea" id="PendingManualLookups" label="Unresolved lookups" readonly></textarea>
                    </div>
                    <button is="emby-button" type="submit" class="raised button-submit block">
                        <span>Save</span>
                    </button>
                    <button is="emby-button" type="button" id="ScanNow" class="raised block">
                        <span>Scan now</span>
                    </button>
                    <button is="emby-button" type="button" id="RefreshStatus" class="raised block">
                        <span>Refresh status</span>
                    </button>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var WrestlingConfig = {
                pluginId: '89e3cfaf-ef94-4dd5-9134-bab43eaf993d',
                pollHandle: null
            };

            document.querySelector('#WrestlingConfigPage').addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                Promise.all([
                    ApiClient.getPluginConfiguration(WrestlingConfig.pluginId),
                    ApiClient.ajax({ type: 'GET', url: ApiClient.getUrl('Wrestling/Libraries'), dataType: 'json' }),
                    ApiClient.ajax({ type: 'GET', url: ApiClient.getUrl('Wrestling/Status'), dataType: 'json' })
                ]).then(function (responses) {
                    loadConfig(responses[0]);
                    loadLibraries(responses[1] || [], responses[0]);
                    renderStatus(responses[2] || {});
                    Dashboard.hideLoadingMsg();
                    startPolling();
                }).catch(function (err) {
                    renderError('Failed to load Wrestling settings', err);
                    Dashboard.hideLoadingMsg();
                });
            });

            document.querySelector('#WrestlingConfigPage').addEventListener('pagehide', function () {
                if (WrestlingConfig.pollHandle) {
                    clearInterval(WrestlingConfig.pollHandle);
                    WrestlingConfig.pollHandle = null;
                }
            });

            document.querySelector('#WrestlingConfigForm').addEventListener('submit', function (event) {
                event.preventDefault();
                Dashboard.showLoadingMsg();
                saveConfig().then(function () {
                    Dashboard.processPluginConfigurationUpdateResult();
                }).catch(function (err) {
                    renderError('Failed to save Wrestling settings', err);
                    Dashboard.hideLoadingMsg();
                });
                return false;
            });

            document.querySelector('#ScanNow').addEventListener('click', function () {
                Dashboard.showLoadingMsg();
                saveConfig().then(function () {
                    return ApiClient.ajax({
                        type: 'POST',
                        url: ApiClient.getUrl('Wrestling/Scan'),
                        dataType: 'json'
                    });
                }).then(function (result) {
                    renderStatus(result || {});
                    Dashboard.hideLoadingMsg();
                    startPolling();
                }).catch(function (err) {
                    renderError('Failed to start Wrestling scan', err);
                    Dashboard.hideLoadingMsg();
                });
            });

            document.querySelector('#RefreshStatus').addEventListener('click', function () {
                refreshStatus();
            });

            function loadConfig(config) {
                document.querySelector('#EnableAutomaticLookup').checked = config.EnableAutomaticLookup !== false;
                document.querySelector('#EnableScheduledScan').checked = config.EnableScheduledScan === true;
                document.querySelector('#CrawlDelaySeconds').value = config.CrawlDelaySeconds || 527;
                document.querySelector('#UserAgent').value = config.UserAgent || 'Jellyfin.Plugin.Wrestling/1.0';
                document.querySelector('#IncludeRatingsInOverview').checked = config.IncludeRatingsInOverview !== false;
                document.querySelector('#PendingManualLookups').value = (config.PendingManualLookups || []).map(function (item) {
                    return [item.Name || item.name || '', item.Year || item.year || '', item.PremiereDate || item.premiereDate || '', item.Reason || item.reason || ''].join(' | ');
                }).join('\n');
            }

            function loadLibraries(libraries, config) {
                var selected = config.SelectedLibraryNames || config.selectedLibraryNames || [];
                var legacyName = config.LibraryName || config.libraryName || '';
                var select = document.querySelector('#SelectedLibraryNames');
                select.innerHTML = '';

                libraries.forEach(function (library) {
                    var name = library.Name || library.name || '';
                    var type = library.CollectionType || library.collectionType || '';
                    var option = document.createElement('option');
                    option.value = name;
                    option.textContent = type ? name + ' (' + type + ')' : name;
                    option.selected = selected.indexOf(name) !== -1 || (!selected.length && legacyName && legacyName.toLowerCase() === name.toLowerCase());
                    select.appendChild(option);
                });
            }

            function saveConfig() {
                return ApiClient.getPluginConfiguration(WrestlingConfig.pluginId).then(function (config) {
                    config.EnableAutomaticLookup = document.querySelector('#EnableAutomaticLookup').checked;
                    config.EnableScheduledScan = document.querySelector('#EnableScheduledScan').checked;
                    config.CrawlDelaySeconds = parseInt(document.querySelector('#CrawlDelaySeconds').value || '527', 10);
                    config.UserAgent = document.querySelector('#UserAgent').value || 'Jellyfin.Plugin.Wrestling/1.0';
                    config.IncludeRatingsInOverview = document.querySelector('#IncludeRatingsInOverview').checked;
                    config.SelectedLibraryNames = Array.prototype.slice.call(document.querySelector('#SelectedLibraryNames').selectedOptions).map(function (option) {
                        return option.value;
                    });
                    config.LibraryName = config.SelectedLibraryNames[0] || config.LibraryName || 'Wrestling PPVs';
                    return ApiClient.updatePluginConfiguration(WrestlingConfig.pluginId, config);
                });
            }

            function refreshStatus() {
                return ApiClient.ajax({
                    type: 'GET',
                    url: ApiClient.getUrl('Wrestling/Status'),
                    dataType: 'json'
                }).then(function (result) {
                    renderStatus(result || {});
                    return result;
                }).catch(function (err) {
                    renderError('Failed to refresh Wrestling scan status', err);
                });
            }

            function startPolling() {
                if (WrestlingConfig.pollHandle) {
                    return;
                }

                WrestlingConfig.pollHandle = setInterval(function () {
                    refreshStatus().then(function (status) {
                        if (!status || !(status.IsRunning || status.isRunning || status.IsQueued || status.isQueued)) {
                            clearInterval(WrestlingConfig.pollHandle);
                            WrestlingConfig.pollHandle = null;
                        }
                    });
                }, 5000);
            }

            function renderStatus(status) {
                var items = status.Items || status.items || [];
                var selected = status.SelectedLibraries || status.selectedLibraries || [];
                var lines = [
                    'State: ' + ((status.IsRunning || status.isRunning) ? 'Running' : ((status.IsQueued || status.isQueued) ? 'Queued' : 'Idle')),
                    'Message: ' + (status.Message || status.message || ''),
                    'Libraries: ' + selected.join(', '),
                    'Current item: ' + (status.CurrentItem || status.currentItem || ''),
                    'Total: ' + (status.Total || status.total || 0),
                    'Queued: ' + (status.Queued || status.queued || 0),
                    'Updated: ' + (status.Updated || status.updated || 0),
                    'Skipped: ' + (status.Skipped || status.skipped || 0),
                    'Failed: ' + (status.Failed || status.failed || 0),
                    'Last CageMatch URL: ' + (status.LastCagematchUrl || status.lastCagematchUrl || ''),
                    'Last CageMatch status: ' + (status.LastCagematchStatus || status.lastCagematchStatus || '')
                ];

                if (items.length) {
                    lines.push('');
                    lines.push('Recent items:');
                    items.slice(-20).forEach(function (item) {
                        lines.push([
                            item.Status || item.status || '',
                            item.Name || item.name || '',
                            item.CagematchEventId || item.cagematchEventId || '',
                            item.Reason || item.reason || ''
                        ].join(' | '));
                    });
                }

                document.querySelector('#ScanStatus').value = lines.join('\n');
            }

            function renderError(message, err) {
                var detail = err && (err.statusText || err.message || err.responseText) ? (err.statusText || err.message || err.responseText) : '';
                document.querySelector('#ScanStatus').value = message + (detail ? '\n' + detail : '');
            }
        </script>
    </div>
</body>
</html>
