<!DOCTYPE html>
<html>
<head>
    <title>Wrestling</title>
    <style>
        .wrestlingPage {
            max-width: 1100px;
        }

        .wrestlingGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 1.25em 0;
        }

        .wrestlingMetric {
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 6px;
            padding: 12px;
            min-height: 70px;
        }

        .wrestlingMetricLabel {
            display: block;
            opacity: .75;
            font-size: .86em;
            margin-bottom: 8px;
        }

        .wrestlingMetricValue {
            display: block;
            font-size: 1.35em;
            font-weight: 600;
            word-break: break-word;
        }

        .wrestlingBanner {
            display: none;
            padding: 12px;
            border-radius: 6px;
            margin: 1em 0;
            background: rgba(183, 28, 28, .28);
            border: 1px solid rgba(255, 120, 120, .55);
        }

        .wrestlingLog {
            min-height: 260px;
            max-height: 420px;
            overflow: auto;
            background: #111;
            border: 1px solid rgba(255, 255, 255, .18);
            border-radius: 6px;
            padding: 10px;
            font-family: Consolas, monospace;
            font-size: 13px;
            line-height: 1.45;
            white-space: pre-wrap;
        }

        .wrestlingActions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 8px;
            margin-top: 1em;
        }

        #SelectedLibraryNames {
            min-height: 180px;
        }

        .wrestlingImportRow {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div id="WrestlingConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary wrestlingPage">
                <form id="WrestlingConfigForm">
                    <div class="inputContainer">
                        <label class="checkboxContainer">
                            <input is="emby-checkbox" type="checkbox" id="EnableAutomaticLookup" />
                            <span>Enable CageMatch title/year lookup</span>
                        </label>
                    </div>
                    <div class="inputContainer">
                        <label class="checkboxContainer">
                            <input is="emby-checkbox" type="checkbox" id="EnableScheduledScan" />
                            <span>Enable scheduled background scan</span>
                        </label>
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="number" id="CrawlDelaySeconds" min="1" label="CageMatch request delay in seconds" />
                    </div>
                    <div class="inputContainer">
                        <input is="emby-input" type="text" id="UserAgent" label="HTTP user agent" />
                    </div>
                    <div class="inputContainer">
                        <label class="checkboxContainer">
                            <input is="emby-checkbox" type="checkbox" id="IncludeRatingsInOverview" />
                            <span>Include ratings in the match card overview</span>
                        </label>
                    </div>
                    <div class="selectContainer">
                        <label class="selectLabel" for="SelectedLibraryNames">Libraries to scan</label>
                        <select is="emby-select" id="SelectedLibraryNames" multiple="multiple"></select>
                        <div class="fieldDescription">Select one or more libraries that contain wrestling PPV movies.</div>
                    </div>

                    <div id="BlockedBanner" class="wrestlingBanner"></div>

                    <div class="wrestlingGrid">
                        <div class="wrestlingMetric"><span class="wrestlingMetricLabel">State</span><span id="MetricState" class="wrestlingMetricValue">Idle</span></div>
                        <div class="wrestlingMetric"><span class="wrestlingMetricLabel">Total</span><span id="MetricTotal" class="wrestlingMetricValue">0</span></div>
                        <div class="wrestlingMetric"><span class="wrestlingMetricLabel">Queued</span><span id="MetricQueued" class="wrestlingMetricValue">0</span></div>
                        <div class="wrestlingMetric"><span class="wrestlingMetricLabel">Updated</span><span id="MetricUpdated" class="wrestlingMetricValue">0</span></div>
                        <div class="wrestlingMetric"><span class="wrestlingMetricLabel">Skipped</span><span id="MetricSkipped" class="wrestlingMetricValue">0</span></div>
                        <div class="wrestlingMetric"><span class="wrestlingMetricLabel">Failed</span><span id="MetricFailed" class="wrestlingMetricValue">0</span></div>
                        <div class="wrestlingMetric"><span class="wrestlingMetricLabel">Blocked</span><span id="MetricBlocked" class="wrestlingMetricValue">0</span></div>
                    </div>

                    <div class="wrestlingGrid">
                        <div class="wrestlingMetric"><span class="wrestlingMetricLabel">Current item</span><span id="MetricCurrentItem" class="wrestlingMetricValue">-</span></div>
                        <div class="wrestlingMetric"><span class="wrestlingMetricLabel">Last CageMatch status</span><span id="MetricCagematchStatus" class="wrestlingMetricValue">-</span></div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel">Queue log</label>
                        <div id="ScanLog" class="wrestlingLog"></div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel">Unresolved lookups</label>
                        <div id="PendingManualLookups" class="wrestlingLog"></div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel">Import CSV cache</label>
                        <div class="wrestlingImportRow">
                            <input type="file" id="CacheCsvFile" accept=".csv,text/csv" />
                            <button is="emby-button" type="button" id="ImportCache" class="raised">
                                <span>Import cache</span>
                            </button>
                        </div>
                        <div id="ImportStatus" class="fieldDescription"></div>
                    </div>

                    <div class="wrestlingActions">
                        <button is="emby-button" type="submit" class="raised button-submit">
                            <span>Save</span>
                        </button>
                        <button is="emby-button" type="button" id="ScanNow" class="raised">
                            <span>Scan now</span>
                        </button>
                        <button is="emby-button" type="button" id="CancelScan" class="raised">
                            <span>Cancel scan</span>
                        </button>
                        <button is="emby-button" type="button" id="RefreshStatus" class="raised">
                            <span>Refresh status</span>
                        </button>
                        <button is="emby-button" type="button" id="ClearStatus" class="raised">
                            <span>Clear status</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var WrestlingConfig = {
                pluginId: '89e3cfaf-ef94-4dd5-9134-bab43eaf993d',
                pollHandle: null
            };

            document.querySelector('#WrestlingConfigPage').addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                Promise.all([
                    ApiClient.getPluginConfiguration(WrestlingConfig.pluginId),
                    ApiClient.ajax({ type: 'GET', url: ApiClient.getUrl('Wrestling/Libraries'), dataType: 'json' }),
                    ApiClient.ajax({ type: 'GET', url: ApiClient.getUrl('Wrestling/Status'), dataType: 'json' })
                ]).then(function (responses) {
                    loadConfig(responses[0]);
                    loadLibraries(responses[1] || [], responses[0]);
                    renderStatus(responses[2] || {});
                    document.querySelector('#ImportStatus').textContent = responses[0].LastImportResult || responses[0].lastImportResult || '';
                    Dashboard.hideLoadingMsg();
                    startPolling();
                }).catch(function (err) {
                    renderError('Failed to load Wrestling settings', err);
                    Dashboard.hideLoadingMsg();
                });
            });

            document.querySelector('#WrestlingConfigPage').addEventListener('pagehide', function () {
                stopPolling();
            });

            document.querySelector('#WrestlingConfigForm').addEventListener('submit', function (event) {
                event.preventDefault();
                Dashboard.showLoadingMsg();
                saveConfig().then(function () {
                    Dashboard.processPluginConfigurationUpdateResult();
                }).catch(function (err) {
                    renderError('Failed to save Wrestling settings', err);
                    Dashboard.hideLoadingMsg();
                });
                return false;
            });

            document.querySelector('#ScanNow').addEventListener('click', function () {
                Dashboard.showLoadingMsg();
                saveConfig().then(function () {
                    return ApiClient.ajax({ type: 'POST', url: ApiClient.getUrl('Wrestling/Scan'), dataType: 'json' });
                }).then(function (result) {
                    renderStatus(result || {});
                    Dashboard.hideLoadingMsg();
                    startPolling();
                }).catch(function (err) {
                    renderError('Failed to start Wrestling scan', err);
                    Dashboard.hideLoadingMsg();
                });
            });

            document.querySelector('#CancelScan').addEventListener('click', function () {
                postStatusAction('Wrestling/CancelScan');
            });

            document.querySelector('#ClearStatus').addEventListener('click', function () {
                postStatusAction('Wrestling/ClearStatus');
            });

            document.querySelector('#RefreshStatus').addEventListener('click', function () {
                refreshStatus();
            });

            document.querySelector('#ImportCache').addEventListener('click', function () {
                var file = document.querySelector('#CacheCsvFile').files[0];
                if (!file) {
                    document.querySelector('#ImportStatus').textContent = 'Choose a CSV file first.';
                    return;
                }

                Dashboard.showLoadingMsg();
                file.text().then(function (text) {
                    return ApiClient.ajax({
                        type: 'POST',
                        url: ApiClient.getUrl('Wrestling/Cache/Import'),
                        dataType: 'json',
                        contentType: 'application/json',
                        data: JSON.stringify({ Csv: text })
                    });
                }).then(function (result) {
                    document.querySelector('#ImportStatus').textContent = result.Message || result.message || 'Import complete.';
                    Dashboard.hideLoadingMsg();
                }).catch(function (err) {
                    document.querySelector('#ImportStatus').textContent = formatError('Import failed', err);
                    Dashboard.hideLoadingMsg();
                });
            });

            function loadConfig(config) {
                document.querySelector('#EnableAutomaticLookup').checked = config.EnableAutomaticLookup !== false;
                document.querySelector('#EnableScheduledScan').checked = config.EnableScheduledScan === true;
                document.querySelector('#CrawlDelaySeconds').value = config.CrawlDelaySeconds || 527;
                document.querySelector('#UserAgent').value = config.UserAgent || 'Jellyfin.Plugin.Wrestling/1.0';
                document.querySelector('#IncludeRatingsInOverview').checked = config.IncludeRatingsInOverview !== false;
                document.querySelector('#PendingManualLookups').textContent = (config.PendingManualLookups || []).map(function (item) {
                    return [item.Name || item.name || '', item.Year || item.year || '', item.PremiereDate || item.premiereDate || '', item.Reason || item.reason || ''].join(' | ');
                }).join('\n') || 'No unresolved lookups.';
            }

            function loadLibraries(libraries, config) {
                var selected = config.SelectedLibraryNames || config.selectedLibraryNames || [];
                var legacyName = config.LibraryName || config.libraryName || '';
                var select = document.querySelector('#SelectedLibraryNames');
                select.innerHTML = '';

                libraries.forEach(function (library) {
                    var name = library.Name || library.name || '';
                    var type = library.CollectionType || library.collectionType || '';
                    var option = document.createElement('option');
                    option.value = name;
                    option.textContent = type ? name + ' (' + type + ')' : name;
                    option.selected = selected.indexOf(name) !== -1 || (!selected.length && legacyName && legacyName.toLowerCase() === name.toLowerCase());
                    select.appendChild(option);
                });
            }

            function saveConfig() {
                return ApiClient.getPluginConfiguration(WrestlingConfig.pluginId).then(function (config) {
                    config.EnableAutomaticLookup = document.querySelector('#EnableAutomaticLookup').checked;
                    config.EnableScheduledScan = document.querySelector('#EnableScheduledScan').checked;
                    config.CrawlDelaySeconds = parseInt(document.querySelector('#CrawlDelaySeconds').value || '527', 10);
                    config.UserAgent = document.querySelector('#UserAgent').value || 'Jellyfin.Plugin.Wrestling/1.0';
                    config.IncludeRatingsInOverview = document.querySelector('#IncludeRatingsInOverview').checked;
                    config.SelectedLibraryNames = Array.prototype.slice.call(document.querySelector('#SelectedLibraryNames').selectedOptions).map(function (option) {
                        return option.value;
                    });
                    config.LibraryName = config.SelectedLibraryNames[0] || config.LibraryName || 'Wrestling PPVs';
                    return ApiClient.updatePluginConfiguration(WrestlingConfig.pluginId, config);
                });
            }

            function postStatusAction(path) {
                Dashboard.showLoadingMsg();
                ApiClient.ajax({ type: 'POST', url: ApiClient.getUrl(path), dataType: 'json' }).then(function (result) {
                    renderStatus(result || {});
                    Dashboard.hideLoadingMsg();
                }).catch(function (err) {
                    renderError('Request failed', err);
                    Dashboard.hideLoadingMsg();
                });
            }

            function refreshStatus() {
                return ApiClient.ajax({ type: 'GET', url: ApiClient.getUrl('Wrestling/Status'), dataType: 'json' }).then(function (result) {
                    renderStatus(result || {});
                    return result;
                }).catch(function (err) {
                    renderError('Failed to refresh Wrestling scan status', err);
                });
            }

            function startPolling() {
                if (WrestlingConfig.pollHandle) {
                    return;
                }

                WrestlingConfig.pollHandle = setInterval(function () {
                    refreshStatus().then(function (status) {
                        var state = get(status, 'ScanState') || get(status, 'scanState');
                        if (!status || ['Running', 'Queued'].indexOf(state) === -1) {
                            stopPolling();
                        }
                    });
                }, 5000);
            }

            function stopPolling() {
                if (WrestlingConfig.pollHandle) {
                    clearInterval(WrestlingConfig.pollHandle);
                    WrestlingConfig.pollHandle = null;
                }
            }

            function renderStatus(status) {
                var items = get(status, 'Items') || [];
                var state = get(status, 'ScanState') || ((get(status, 'IsRunning')) ? 'Running' : ((get(status, 'IsQueued')) ? 'Queued' : 'Idle'));
                var blockedReason = get(status, 'BlockedReason') || '';

                setText('#MetricState', state);
                setText('#MetricTotal', get(status, 'Total') || 0);
                setText('#MetricQueued', get(status, 'Queued') || 0);
                setText('#MetricUpdated', get(status, 'Updated') || 0);
                setText('#MetricSkipped', get(status, 'Skipped') || 0);
                setText('#MetricFailed', get(status, 'Failed') || 0);
                setText('#MetricBlocked', get(status, 'Blocked') || 0);
                setText('#MetricCurrentItem', get(status, 'CurrentItem') || get(status, 'LastAttemptedItem') || '-');
                setText('#MetricCagematchStatus', get(status, 'LastCagematchStatus') || '-');

                var banner = document.querySelector('#BlockedBanner');
                if (state === 'Blocked' || blockedReason) {
                    banner.style.display = 'block';
                    banner.textContent = blockedReason || get(status, 'Message') || 'CageMatch blocked this scan.';
                } else {
                    banner.style.display = 'none';
                    banner.textContent = '';
                }

                var selected = get(status, 'SelectedLibraries') || [];
                var lines = [
                    'State: ' + state,
                    'Message: ' + (get(status, 'Message') || ''),
                    'Libraries: ' + selected.join(', '),
                    'Current item: ' + (get(status, 'CurrentItem') || ''),
                    'Last attempted item: ' + (get(status, 'LastAttemptedItem') || ''),
                    'Last CageMatch URL: ' + (get(status, 'LastCagematchUrl') || ''),
                    'Last CageMatch status: ' + (get(status, 'LastCagematchStatus') || '')
                ];

                if (items.length) {
                    lines.push('');
                    lines.push('Recent queue entries:');
                    items.slice(-100).forEach(function (item) {
                        lines.push([
                            get(item, 'Status') || '',
                            get(item, 'Name') || '',
                            get(item, 'CagematchEventId') || '',
                            get(item, 'SearchMessage') || '',
                            get(item, 'Reason') || ''
                        ].join(' | '));
                    });
                }

                document.querySelector('#ScanLog').textContent = lines.join('\n');
            }

            function renderError(message, err) {
                document.querySelector('#ScanLog').textContent = formatError(message, err);
            }

            function formatError(message, err) {
                var detail = err && (err.statusText || err.message || err.responseText) ? (err.statusText || err.message || err.responseText) : '';
                return message + (detail ? '\n' + detail : '');
            }

            function setText(selector, value) {
                document.querySelector(selector).textContent = value;
            }

            function get(obj, name) {
                if (!obj) {
                    return null;
                }

                return obj[name] !== undefined ? obj[name] : obj[name.charAt(0).toLowerCase() + name.slice(1)];
            }
        </script>
    </div>
</body>
</html>
